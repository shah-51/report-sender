name: build

# Runs in the PUBLIC repo (free unlimited Actions). Checks out the PRIVATE code repo with a
# read-only token (secret CODE_TOKEN), builds, and publishes releases to THIS repo via the
# built-in GITHUB_TOKEN (same-repo = free, no extra token for publishing).
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag of the private code repo to build"
        default: main

permissions:
  contents: write

jobs:
  # Windows + macOS arm64 — covers all realistic hardware; carries the auto-update feeds.
  # (Intel x64 via macos-13 was dropped — GitHub Intel runners won't reliably allocate; if an
  # Intel-Mac user appears, switch the mac target to a universal build on the arm64 runner.)
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: shah-51/whatsapp-report-sender
          ref: ${{ inputs.ref }}
          token: ${{ secrets.CODE_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx puppeteer browsers install chrome
      - name: Build and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
